name: Library Snapshot

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Load secrets from OP
        id: load-secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 #v4.0.0
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ARABOT_PAT_TRIGGER_WORKFLOW: op://kv_aragon-subdomain_infra/GITHUB_PAT/credential
          NPM_TOKEN: op://kv_aragon-subdomain_infra/NPM_TOKEN/credential
      - name: Checkout actions
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github/actions/setup
      - name: Setup
        uses: ./.github/actions/setup
        with:
          # Checkout full history to correclty check changeset status
          fetch-depth: 0
          token: ${{ steps.load-secrets.outputs.ARABOT_PAT_TRIGGER_WORKFLOW }}
      - name: Build library
        run: pnpm build
      - name: Update version
        run: pnpm changeset version --snapshot
        env:
          GITHUB_TOKEN: ${{ steps.load-secrets.outputs.ARABOT_PAT_TRIGGER_WORKFLOW }}
      - name: Get package version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@v1.3.1
      - name: Publish snapshot
        run: |
          pnpm config set npmAuthToken ${{ steps.load-secrets.outputs.NPM_TOKEN }}
          pnpm publish --access public --tag snapshot-${{ github.run_id }} --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ steps.load-secrets.outputs.NPM_TOKEN }}
      - name: Write snapshot version to summary
        run: |
          {
            echo "## Snapshot Published"
            echo ""
            echo "**Version:** \`${{ steps.package-version.outputs.current-version }}\`"
            echo "**npm tag:** \`snapshot-${{ github.run_id }}\`"
            echo ""
            echo "Install with:"
            echo ""
            echo '```bash'
            echo "pnpm add @aragon/aragon-subdomain@snapshot-${{ github.run_id }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
