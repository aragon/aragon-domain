name: Library Snapshot

# Reusable workflow invoked by the `publish.yml` entry point (the npm Trusted
# Publisher). Publishing authenticates via OIDC — no long-lived NPM_TOKEN.
on:
  workflow_call:

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Load secrets from OP
        id: load-secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 #v4.0.0
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ARABOT_PAT_TRIGGER_WORKFLOW: op://kv_aragon-subdomain_infra/GITHUB_PAT/credential
      - name: Checkout actions
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github/actions/setup
      - name: Setup
        uses: ./.github/actions/setup
        with:
          # Checkout full history to correclty check changeset status
          fetch-depth: 0
          token: ${{ steps.load-secrets.outputs.ARABOT_PAT_TRIGGER_WORKFLOW }}
      - name: Build library
        run: pnpm build
      - name: Get base version
        id: base-version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Update version
        run: pnpm changeset version --snapshot
        env:
          GITHUB_TOKEN: ${{ steps.load-secrets.outputs.ARABOT_PAT_TRIGGER_WORKFLOW }}
      - name: Get package version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@v1.3.1
      - name: Detect snapshot change
        id: detect
        run: |
          if [ "${{ steps.base-version.outputs.version }}" = "${{ steps.package-version.outputs.current-version }}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish snapshot
        if: steps.detect.outputs.changed == 'true'
        # Authenticated via OIDC trusted publishing (id-token). No auth token.
        # --provenance emits a signed build-provenance attestation.
        run: pnpm publish --access public --tag snapshot-${{ github.run_id }} --no-git-checks --provenance
      - name: Write snapshot version to summary
        if: steps.detect.outputs.changed == 'true'
        run: |
          {
            echo "## Snapshot Published"
            echo ""
            echo "**Version:** \`${{ steps.package-version.outputs.current-version }}\`"
            echo "**npm tag:** \`snapshot-${{ github.run_id }}\`"
            echo ""
            echo "Install with:"
            echo ""
            echo '```bash'
            echo "pnpm add @aragon/aragon-subdomain@snapshot-${{ github.run_id }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Write no-op to summary
        if: steps.detect.outputs.changed == 'false'
        run: |
          {
            echo "## Snapshot Skipped"
            echo ""
            echo "No pending changesets, so \`changeset version --snapshot\` did not"
            echo "produce a new version (still \`${{ steps.base-version.outputs.version }}\`)."
            echo "Nothing to publish."
          } >> "$GITHUB_STEP_SUMMARY"
