name: Library Release

# On every push to main this workflow runs changesets/action, which has two phases:
#
#   1. Pending changesets exist  -> open/update a "chore: version packages" PR that bumps the
#      version and regenerates the CHANGELOG. Branch-protection checks (CodeQL, etc.) run on
#      that PR, so the version bump lands on main through code review.
#   2. No pending changesets     -> the version PR has merged; build, publish to npmjs, push the
#      tag, and create the GitHub release.

on:
  push:
    branches:
      - main

# Don't let two release runs on the same ref overlap.
concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Load secrets
        id: load-secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 #v4.0.0
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ARABOT_PAT_TRIGGER_WORKFLOW: op://kv_aragon-subdomain_infra/GITHUB_PAT/credential
          NPM_TOKEN: op://kv_aragon-subdomain_infra/NPM_TOKEN/credential
      - name: Checkout actions
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github/actions/setup
      - name: Setup
        uses: ./.github/actions/setup
        with:
          fetch-depth: 0
          # Use the PAT (not the default GITHUB_TOKEN) so the version PR and pushed tags
          # are able to trigger downstream workflows such as CodeQL.
          token: ${{ steps.load-secrets.outputs.ARABOT_PAT_TRIGGER_WORKFLOW }}
      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@3841a0683d3cfa6dae0f9bb335290003010fe3f0 # v1.9.0
        with:
          version: pnpm run version
          publish: pnpm run release
          title: "chore: version packages"
          commit: "chore: version packages"
          # GitHub API signs and verifies the commit and attributes to the PAT owner
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ steps.load-secrets.outputs.ARABOT_PAT_TRIGGER_WORKFLOW }}
          NPM_TOKEN: ${{ steps.load-secrets.outputs.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ steps.load-secrets.outputs.NPM_TOKEN }}
