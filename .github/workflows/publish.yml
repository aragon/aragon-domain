name: Publish

# Registered as the npm Trusted Publisher for @aragon/aragon-domain. The
# publish steps run INLINE in this file (no reusable workflow) so the workflow
# identity in the OIDC token always matches the registered publisher — npm
# rejects the token exchange (404) if a reusable/called workflow runs the
# publish instead. Auth is OIDC trusted publishing; no long-lived NPM_TOKEN.
#   - release event            -> stable publish (`latest`), gated by approval
#   - manual workflow_dispatch  -> snapshot publish (snapshot-<run-id> tag)
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write # required for OIDC trusted publishing
  contents: read

jobs:
  release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    # Human approval gate: the `npm-publish` environment is configured in
    # repo Settings → Environments with @aragon/app-team as required reviewers,
    # so every stable release publish must be approved before this job runs.
    environment: npm-publish
    steps:
      - name: Checkout actions
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github/actions/setup
      - name: Setup
        uses: ./.github/actions/setup
        with:
          # Make sure to checkout the main branch with the bumped version on the package.json file as Github does the
          # checkout of the commit SHA that triggered the publish workflow by default
          ref: main
      - name: Build library
        run: pnpm build
      - name: Publish library
        # Authenticated via OIDC trusted publishing (id-token). No auth token.
        # --provenance emits a signed build-provenance attestation.
        run: pnpm publish --access public --provenance

  snapshot:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Load secrets from OP
        id: load-secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 #v4.0.0
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ARABOT_PAT_TRIGGER_WORKFLOW: op://kv_aragon-domain_infra/GITHUB_PAT/credential
      - name: Checkout actions
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github/actions/setup
      - name: Setup
        uses: ./.github/actions/setup
        with:
          # Checkout full history to correclty check changeset status
          fetch-depth: 0
          token: ${{ steps.load-secrets.outputs.ARABOT_PAT_TRIGGER_WORKFLOW }}
      - name: Build library
        run: pnpm build
      - name: Get base version
        id: base-version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Update version
        run: pnpm changeset version --snapshot
        env:
          GITHUB_TOKEN: ${{ steps.load-secrets.outputs.ARABOT_PAT_TRIGGER_WORKFLOW }}
      - name: Get package version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@3cf273023a0dda27efcd3164bdfb51908dd46a5b # v1.3.1
      - name: Detect snapshot change
        id: detect
        run: |
          if [ "${{ steps.base-version.outputs.version }}" = "${{ steps.package-version.outputs.current-version }}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish snapshot
        if: steps.detect.outputs.changed == 'true'
        # Authenticated via OIDC trusted publishing (id-token). No auth token.
        # --provenance emits a signed build-provenance attestation.
        run: pnpm publish --access public --tag snapshot-${{ github.run_id }} --no-git-checks --provenance
      - name: Write snapshot version to summary
        if: steps.detect.outputs.changed == 'true'
        run: |
          {
            echo "## Snapshot Published"
            echo ""
            echo "**Version:** \`${{ steps.package-version.outputs.current-version }}\`"
            echo "**npm tag:** \`snapshot-${{ github.run_id }}\`"
            echo ""
            echo "Install with:"
            echo ""
            echo '```bash'
            echo "pnpm add @aragon/aragon-domain@snapshot-${{ github.run_id }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Write no-op to summary
        if: steps.detect.outputs.changed == 'false'
        run: |
          {
            echo "## Snapshot Skipped"
            echo ""
            echo "No pending changesets, so \`changeset version --snapshot\` did not"
            echo "produce a new version (still \`${{ steps.base-version.outputs.version }}\`)."
            echo "Nothing to publish."
          } >> "$GITHUB_STEP_SUMMARY"
